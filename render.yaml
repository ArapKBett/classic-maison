services:
  - type: web
    name: classic-maison
    runtime: node
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    preDeployCommand: npx prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: classic-maison-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_WHATSAPP_NUMBER
        value: "+254700200658"
      - key: NEXT_PUBLIC_INSTAGRAM_HANDLE
        value: "classicmaison"
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

databases:
  - name: classic-maison-db
    plan: free
